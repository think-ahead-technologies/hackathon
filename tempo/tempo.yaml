# ABOUTME: Tempo config — receives OTLP traces from the collector, stores them locally.
# ABOUTME: Pure trace storage; service-graph/span metrics are derived in the OTel collector.

stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 1h          # demo retention; matches the edge ring-buffer story

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
