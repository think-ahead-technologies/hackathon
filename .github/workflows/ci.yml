# ABOUTME: CI — runs every test suite in the repo on pull requests and pushes to main.
# ABOUTME: Mirrors the `make test*` targets and the firmware/wear_detector suites natively.
name: CI

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same branch/PR cancels the in-flight run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: python · ${{ matrix.component }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # bridge pulls asyncpg, which only ships wheels for the project's target (3.12).
        component: [bridge, pipeline, serial-shim]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        working-directory: ${{ matrix.component }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        working-directory: ${{ matrix.component }}
        run: python -m pytest -q

  wear-detector:
    name: wear_detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pytest
      # test_dataset.py self-skips when the (large, gitignored) recordings are absent;
      # the TF tests self-skip via importorskip when tensorflow is absent.
      - name: Run tests
        run: python -m pytest -q wear_detector/tests

  firmware:
    name: firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: |
          pip install cryptography
          sudo apt-get update && sudo apt-get install -y cppcheck
      - name: Unit tests (host logic)
        run: make -C firmware test
      - name: Unit tests under ASan + UBSan
        run: make -C firmware test-san
      - name: Static analysis (cppcheck)
        run: make -C firmware lint
      # These import the Platform-side framer/provisioning from pipeline/ via a
      # repo-relative sys.path, so no PYTHONPATH is needed.
      - name: Cross-language wire-format test
        run: make -C firmware crosslang
      - name: Live NATS nkey-login test
        run: make -C firmware nats-login

  vector:
    name: vector policy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Data-minimization policy test
        run: |
          docker run --rm -v "$PWD/vector":/etc/vector timberio/vector:0.50.0-debian \
            test /etc/vector/vector.yaml /etc/vector/vector.test.yaml
